<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User details form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#000000',
            text: '#333333',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background">
  <div class="min-h-screen flex flex-col lg:flex-row bg-white">
    <!-- Left Side - Welcome Message -->
    <div class="hidden lg:flex lg:w-1/2 items-center justify-center p-6 bg-white">
      <div class="max-w-md text-black">
        <h1 class="text-5xl font-extrabold mb-6 tracking-tight leading-tight">
          <span class="bg-gradient-to-r from-cyan-700 via-blue-400 to-emerald-400 bg-clip-text text-transparent">
            The best offer <br />for your business
          </span>
        </h1>
        <p class="text-lg mb-8 text-gray-700">
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Temporibus, aperiam suscipit eos quam porro iusto dolore excepturi nesciunt illum recusandae qui facilis reprehenderit, voluptas ullam expedita laborum atque libero beatae.
        </p>
      </div>
    </div>

    <!-- Right Side - Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center px-4 py-8 bg-white">
      <div class="w-full max-w-xl">
        <div class="p-6">
          <form class="space-y-6 border border-white shadow-lg hover:shadow-2xl transition-shadow duration-300 p-6 sm:p-10 bg-white rounded-xl">
            <!-- Name Fields -->
            <div class="flex flex-col md:flex-row gap-4">
              <input type="text" class="w-full md:w-1/2 px-4 py-2 rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="First name" />
              <input type="text" class="w-full md:w-1/2 px-4 py-2 rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Last name" />
            </div>
            <!-- Email -->
            <div>
              <input type="email" class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Email address" />
            </div>
            <!-- Password -->
            <div>
              <input type="password" class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Password" />
            </div>
            <!-- Checkbox & Submit -->
            <div class="flex flex-col items-center space-y-4">
              <div class="flex items-center justify-center">
                <input type="checkbox" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <label class="ml-2 text-gray-700">Subscribe to our newsletter</label>
              </div>
              <button type="submit" class="w-full bg-primary text-white py-2 rounded-md hover:bg-primary/90 transition-colors">
                Sign Up
              </button>
            </div>

            <!-- Divider -->
            <div class="flex items-center my-4">
              <div class="flex-grow h-px bg-gray-300"></div>
              <span class="mx-3 text-gray-500">or sign up with</span>
              <div class="flex-grow h-px bg-gray-300"></div>
            </div>

            <!-- Social Icons -->
            <div class="flex justify-center gap-4 flex-wrap">
              <button type="button" class="flex items-center justify-center w-10 h-10 rounded-full bg-blue-600 text-white hover:bg-blue-700">
                <i class="fab fa-facebook-f"></i>
              </button>
              <button type="button" class="flex items-center justify-center w-10 h-10 rounded-full bg-white border border-gray-300 text-gray-700 hover:bg-gray-100">
                <i class="fab fa-google"></i>
              </button>
              <button type="button" class="flex items-center justify-center w-10 h-10 rounded-full bg-blue-400 text-white hover:bg-blue-500">
                <i class="fab fa-twitter"></i>
              </button>
              <button type="button" class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-800 text-white hover:bg-gray-900">
                <i class="fab fa-github"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
